<script type="text/javascript">
        var gk_isXlsx = false;
        var gk_xlsxFileLookup = {};
        var gk_fileData = {};
        function filledCell(cell) {
          return cell !== '' && cell != null;
        }
        function loadFileData(filename) {
        if (gk_isXlsx && gk_xlsxFileLookup[filename]) {
            try {
                var workbook = XLSX.read(gk_fileData[filename], { type: 'base64' });
                var firstSheetName = workbook.SheetNames[0];
                var worksheet = workbook.Sheets[firstSheetName];
                var jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1, blankrows: false, defval: '' });
                var filteredData = jsonData.filter(row => row.some(filledCell));
                var headerRowIndex = filteredData.findIndex((row, index) =>
                  row.filter(filledCell).length >= filteredData[index + 1]?.filter(filledCell).length
                );
                if (headerRowIndex === -1 || headerRowIndex > 25) headerRowIndex = 0;
                var csv = XLSX.utils.aoa_to_sheet(filteredData.slice(headerRowIndex));
                csv = XLSX.utils.sheet_to_csv(csv, { header: 1 });
                return csv;
            } catch (e) {
                console.error("Error in loadFileData:", e);
                return "";
            }
        }
        return gk_fileData[filename] || "";
        }
        </script><!DOCTYPE html>

<body class="bg-gray-100 pb-24">
    <div class="app-scaler">
        <div id="loadingMessage" class="loading-message text-gray-700">Loading Driver Check-In Portal...</div>
        <div id="appContent" class="relative hidden">

                <button onclick="exportDatabase()" class="bg-green-500 text-white px-4 py-2 rounded-lg hover:bg-green-600 active:bg-green-700 shadow-md hover:shadow-lg transition-all">Export Database</button>
                <button onclick="exportToCSV()" class="bg-teal-500 text-white px-4 py-2 rounded-lg hover:bg-teal-600 active:bg-teal-700 shadow-md hover:shadow-lg transition-all">Export to CSV</button>
                <button onclick="endShift()" title="Save today's shift data and clear current view" class="bg-purple-500 text-white px-4 py-2 rounded-lg hover:bg-purple-600 active:bg-purple-700 shadow-md hover:shadow-lg transition-all">End of Shift</button>

        <div id="contextMenu" class="context-menu hidden">
            <div onclick="handleContextMenu('cleared')" class="hover:bg-gray-100 rounded-t-md">Cleared</div>

        </div>

        <div id="addCallMenu" class="context-menu hidden">
            <div onclick="handleAddCallOption('Account')" class="hover:bg-gray-100">Account</div>
            <div onclick="handleAddCallOption('Police')" class="hover:bg-gray-100">Police</div>
            <div onclick="handleAddCallOption('Roadside')" class="hover:bg-gray-100">Roadside</div>
            <div onclick="handleAddCallOption('MTO')" class="hover:bg-gray-100">MTO</div>
            <div onclick="handleAddCallOption('Cash call')" class="hover:bg-gray-100">Cash call</div>
            <div onclick="handleAddCallOption('Refused')" class="hover:bg-gray-100">Refused</div>
            <div onclick="handleAddCallOption('Stepped out')" class="hover:bg-gray-100">Stepped out</div>
        </div>

        <div id="statusChangeMenu" class="context-menu hidden">
            <div onclick="changeStatusToCleared()" class="hover:bg-gray-100 rounded-md">Change to Cleared</div>
        </div>
    </div>

    <script>
        // Global database variable
        // let db; // SQL.js db instance removed
        // Global array for current drivers in the UI
        let drivers = [];
        // Global variables for context menu state
        let selectedDriverId = null;
        let selectedTimestamp = null; // This might refer to the prefixed timestamp from the UI
        let addCallDriverId = null;
        // Global variable for sort order
        let sortByClearedOrder = false; // false = sort by sign-in, true = sort by (most recent) cleared time

        // UI update functions
        function showLoading() {
            document.getElementById('loadingMessage').style.display = 'block';
            document.getElementById('appContent').classList.add('hidden');
        }
        function showApp() {
            document.getElementById('loadingMessage').style.display = 'none';
            document.getElementById('appContent').classList.remove('hidden');
        }
        function showInitError(message) { // May repurpose for general app init errors
            const loadingMsgEl = document.getElementById('loadingMessage');
            if (loadingMsgEl) {
                loadingMsgEl.innerHTML = `<div class="error-message p-4 bg-red-100 text-red-700 border border-red-400 rounded-md">${message}</div>`;
                loadingMsgEl.style.display = 'block';
            }
            const appContentEl = document.getElementById('appContent');
            if (appContentEl) appContentEl.classList.add('hidden');
        }
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            if (errorDiv && errorText) {
                errorText.textContent = message;
                errorDiv.classList.remove('hidden');
                setTimeout(() => { errorDiv.classList.add('hidden'); }, 7000);
            } else {
                console.error("Error display elements (errorMessage or errorText) not found. Original message:", message);
            }
        }

        // Database related functions (initDb, verifyAndCreateTables, saveDb) removed.
        // saveDrivers function (localStorage for drivers array) removed.

        function exportDatabase() {
            console.log('[Export DB] Requesting SQLite DB from backend...');
            window.location.href = 'http://localhost:3000/api/export/sqlite';
        }

        function exportToCSV() {
            console.log('[Export CSV] Requesting CSV data from backend...');
            window.location.href = 'http://localhost:3000/api/export/csv';
        }

        function showContextMenu(event, driverId, callFullTimestamp) {
            event.preventDefault(); selectedDriverId = driverId; selectedTimestamp = callFullTimestamp;
            // selectedTimestamp here is the one displayed in UI, e.g., "Acc 12:34:56"
            const menu = document.getElementById('contextMenu');
            menu.style.left = `${event.pageX}px`; menu.style.top = `${event.pageY}px`; menu.classList.remove('hidden');
            document.addEventListener('click', hideContextMenus, { once: true });
        }
        function showAddCallMenu(event, driverId) {
            event.preventDefault(); addCallDriverId = driverId;
            const menu = document.getElementById('addCallMenu');
            menu.style.left = `${event.pageX}px`; menu.style.top = `${event.pageY}px`; menu.classList.remove('hidden');
            document.addEventListener('click', hideContextMenus, { once: true });
        }
        function showStatusChangeMenu(event, driverId, callFullTimestamp, currentStatus) {
            event.preventDefault();
            // Client-side check if currentStatus is 'cancelled' can remain or be removed if backend handles all validation
            if (currentStatus !== 'cancelled') {
                 console.log("Status change menu only for 'cancelled' calls currently.");
                 return;
            }
            selectedDriverId = driverId; selectedTimestamp = callFullTimestamp;
            const menu = document.getElementById('statusChangeMenu');
            menu.style.left = `${event.pageX}px`; menu.style.top = `${event.pageY}px`; menu.classList.remove('hidden');
            document.addEventListener('click', hideContextMenus, { once: true });
        }
        function hideContextMenus() {
            ['contextMenu', 'addCallMenu', 'statusChangeMenu'].forEach(id => document.getElementById(id).classList.add('hidden'));
        }

        async function handleContextMenu(action) {
            if (!selectedDriverId || !selectedTimestamp) {
                showError("Cannot set call status: Driver or timestamp not selected.");
                return;
            }
            console.log(`Attempting to set call status to '${action}' for driver ID: ${selectedDriverId}, timestamp: ${selectedTimestamp}`);

            await fetchWithFeedback(
                `http://localhost:3000/api/calls/status`,
                'PUT',
                {
                    driverId: selectedDriverId,
                    callTimestamp: selectedTimestamp, // This is the full "Type HH:MM:SS" string
                    status: action
                },
                `Call status set to ${action}!` // Default success message
            );

            selectedDriverId = null;
            selectedTimestamp = null;
            // fetchAndRenderDrivers() is called by fetchWithFeedback on success
        }

        async function changeStatusToCleared() {
            if (!selectedDriverId || !selectedTimestamp) {
                showError("Cannot change call status: Driver or timestamp not selected.");
                return;
            }
            console.log(`Attempting to change call status to 'cleared' for driver ID: ${selectedDriverId}, timestamp: ${selectedTimestamp}`);

            await fetchWithFeedback(
                `http://localhost:3000/api/calls/status`,
                'PUT',
                {
                    driverId: selectedDriverId,
                    callTimestamp: selectedTimestamp, // This is the full "Type HH:MM:SS" string
                    status: 'cleared'
                },
                'Call status changed to cleared!' // Default success message
            );

            selectedDriverId = null;
            selectedTimestamp = null;
            // fetchAndRenderDrivers() is called by fetchWithFeedback on success
        }

        function handleAddCallOption(callType) {
            if (!addCallDriverId) return;
            addCall(addCallDriverId, callType); // addCall will be updated to use API
            addCallDriverId = null;
        }

        // Helper function for API calls with JSON body and feedback
        async function fetchWithFeedback(url, method, body, successMessage) {
            try {
                const options = {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                };
                if (body) {
                    options.body = JSON.stringify(body);
                }
                const response = await fetch(url, options);
                if (!response.ok) {
                    let errorData;
                    try { errorData = await response.json(); } catch (e) { errorData = { message: response.statusText }; }
                    const errDetail = errorData.error || errorData.message || `HTTP ${response.status}`;
                    console.error(`API Error (${method} ${url}): ${errDetail}`, errorData);
                    showError(`Error: ${errDetail}`);
                    return null; // Indicate failure
                }

                let responseData = {}; // Default for non-JSON or empty responses
                const contentType = response.headers.get("content-type");
                if (contentType && contentType.indexOf("application/json") !== -1) {
                    responseData = await response.json(); // Parse JSON only if header indicates it
                } else if (response.status === 204) { // No Content
                    // responseData remains {}
                } else {
                    // If not JSON and not 204, maybe text? Or handle as unexpected.
                    // For now, we assume JSON or nothing for successful mutations.
                    console.log(`Response for ${method} ${url} was not JSON, status ${response.status}`);
                }


                if (successMessage) {
                    showError(responseData.message || successMessage); // Prefer API message
                }
                await fetchAndRenderDrivers(); // Refresh data
                return responseData;
            } catch (error) {
                console.error(`Network or other error (${method} ${url}):`, error);
                showError(`Network Error: ${error.message}. Could not connect to backend.`);
                return null;
            }
        }

        async function addDriver() {
            const nameInput = document.getElementById('driverName');
            const name = nameInput.value.trim();
            if (name === '') {
                showError('Enter driver name.');
                return;
            }

            const result = await fetchWithFeedback(
                'http://localhost:3000/api/drivers',
                'POST',
                { name: name },
                'Driver added successfully!' // Default success message if API doesn't provide one
            );

            if (result) { // If API call was successful (not null)
                nameInput.value = ''; // Clear input only on success
            }
        }

        async function checkIn(driverId) {
            console.log(`Attempting check-in for driver ID: ${driverId}`);
            await fetchWithFeedback(
                `http://localhost:3000/api/checkin`,
                'POST',
                { driverId: driverId },
                'Driver checked in successfully!' // Default success message
            );
            // fetchAndRenderDrivers() is called by fetchWithFeedback on success
        }

        async function signOut(driverId) {
            console.log(`Attempting sign-out for driver ID: ${driverId}`);
            // Optional: Add a confirmation dialog if desired
            // if (!confirm("Are you sure you want to sign out this driver?")) {
            //     return;
            // }
            await fetchWithFeedback(
                `http://localhost:3000/api/signout`,
                'POST',
                { driverId: driverId },
                'Driver signed out successfully!' // Default success message
            );
            // fetchAndRenderDrivers() is called by fetchWithFeedback on success
        }

        async function addCall(driverId, callType) {
            console.log(`Attempting to add call type '${callType}' for driver ID: ${driverId}`);
            await fetchWithFeedback(
                `http://localhost:3000/api/calls`,
                'POST',
                { driverId: driverId, callType: callType },
                'Call added successfully!' // Default success message
            );
            // fetchAndRenderDrivers() is called by fetchWithFeedback on success
        }

        async function endShift() {
            if (!confirm("Are you sure you want to end the shift? This will save a summary and clear the current view.")) {
                return;
            }

            console.log("Ending shift and submitting summary to backend...");
            const result = await fetchWithFeedback(
                'http://localhost:3000/api/shifts/end',
                'POST',
                {}, // No body needed for this request as backend calculates based on current day
                'Shift ended and summary saved successfully!' // Default success message
            );

            if (result) {
                // If backend confirms, clear the local view
                drivers = [];
                renderDrivers(); // Re-render to show empty list
                // The fetchAndRenderDrivers() called by fetchWithFeedback will likely get an empty list
                // if the backend logic for GET /api/drivers is tied to "active" non-ended shifts,
                // or it might just show all drivers if not. For now, explicitly clearing is fine.
                // A better UX might be to fetch a list of historical shifts or a confirmation message.
            }
        }

        function toggleSortOrder() {
            sortByClearedOrder = !sortByClearedOrder;
            const sortButton = document.getElementById('sortButton');
            if (sortByClearedOrder) {
                sortButton.textContent = 'Sort by Sign-In Time';
                sortButton.classList.remove('bg-indigo-500', 'hover:bg-indigo-600', 'active:bg-indigo-700');
                sortButton.classList.add('bg-pink-500', 'hover:bg-pink-600', 'active:bg-pink-700');
            } else {
                sortButton.textContent = 'Sort by Cleared Time';
                sortButton.classList.remove('bg-pink-500', 'hover:bg-pink-600', 'active:bg-pink-700');
                sortButton.classList.add('bg-indigo-500', 'hover:bg-indigo-600', 'active:bg-indigo-700');
            }
            renderDrivers();
        }

        function renderDrivers() {
            console.log(`[RenderDrivers] Starting. SortByCleared: ${sortByClearedOrder}. Drivers count: ${drivers.length}`);
            let driversToRender = [...drivers];

            // Data from backend is now rich: {id, name, isCheckedIn, checkInTime, signOutTime, calls: [...], relevantClearedTimestamp}
            if (sortByClearedOrder) {
                console.log("[RenderDrivers] Sorting by Cleared Time.");
                driversToRender.sort((a, b) => {
                    // Sort by MOST RECENT relevantClearedTimestamp (descending for time strings)
                    if (a.relevantClearedTimestamp && b.relevantClearedTimestamp) {
                        return b.relevantClearedTimestamp.localeCompare(a.relevantClearedTimestamp);
                    }
                    if (a.relevantClearedTimestamp) return -1; // a has cleared, b does not -> a comes first
                    if (b.relevantClearedTimestamp) return 1;  // b has cleared, a does not -> b comes first

                    // Fallback to check-in time (ascending) if no relevant cleared times
                    if (a.checkInTime && b.checkInTime) return a.checkInTime.localeCompare(b.checkInTime);
                    if (a.checkInTime) return -1;
                    if (b.checkInTime) return 1;
                    return (a.name || "").localeCompare(b.name || ""); // Ultimate fallback by name
                });
            } else {
                 console.log("[RenderDrivers] Sorting by Sign-In Time.");
                 driversToRender.sort((a, b) => {
                    if (a.checkInTime && !b.checkInTime) return -1;
                    if (!a.checkInTime && b.checkInTime) return 1;
                    if (a.checkInTime && b.checkInTime) {
                        const compareResult = a.checkInTime.localeCompare(b.checkInTime);
                        if (compareResult !== 0) return compareResult;
                    }
                    // Fallback to name if check-in times are same or both null
                    return (a.name || "").localeCompare(b.name || "");
                 });
            }

            const driverList = document.getElementById('driverList');
            driverList.innerHTML = '';
            if (driversToRender.length === 0) {
                driverList.innerHTML = '<p class="text-gray-500 text-center py-4">No drivers to display.</p>';
                return;
            }

            driversToRender.forEach(driver => {
                const { id, name, isCheckedIn, checkInTime, signOutTime, calls, relevantClearedTimestamp } = driver;

                const card = document.createElement('div');
                card.className = 'border border-gray-200 rounded-lg p-4 relative shadow-sm hover:shadow-md transition-shadow';
                let content = `<p class="text-lg font-medium text-gray-800">${name} (ID: ${id})</p>`;

                if (sortByClearedOrder && relevantClearedTimestamp) {
                    content += `<p class="text-xs text-pink-600 font-semibold">Last Cleared: ${relevantClearedTimestamp}</p>`;
                }

                // Logic for displaying driver status
                if (!checkInTime && !signOutTime) { // Never checked in, or backend didn't return checkInTime (should not happen for existing drivers)
                    content += `<p class="text-sm text-gray-500">Not checked in today</p>`;
                } else if (isCheckedIn) { // Actively checked in
                    content += `<div class="text-sm text-gray-600">In: <span class="font-semibold">${checkInTime}</span></div>`;
                } else if (signOutTime) { // Checked in earlier and then signed out
                     content += `<div class="text-sm text-gray-600">In: <span class="font-semibold">${checkInTime}</span> | Out: <span class="font-semibold">${signOutTime}</span></div>`;
                     // Optionally, display calls made during that session even if signed out
                }


                if (calls && calls.length > 0) {
                    content += `<div class="mt-2"><p class="text-xs font-semibold text-gray-700">Calls:</p><div class="timestamps-container mt-1">`;
                    calls.forEach(call => {
                        const callTsFull = call.fullCallTimestamp; // Already reconstructed by backend
                        const sInfo = call.statusInfo;
                        let callCls = 'bg-gray-200 text-gray-800', stCls = 'bg-transparent text-transparent', stTs = '&nbsp;';
                        if (sInfo) {
                            if (sInfo.status === 'cancelled') { callCls = 'bg-red-100 text-red-600 line-through'; stCls = 'bg-red-500 text-white'; }
                            else if (sInfo.status === 'cleared') { callCls = 'bg-green-100 text-green-700'; stCls = 'bg-green-500 text-white'; }
                            stTs = sInfo.statusTimestamp;
                        }
                        // Context menus should only be active if the driver is currently checked in (isCheckedIn = true)
                        const callCtx = isCheckedIn ? `oncontextmenu="event.preventDefault(); showContextMenu(event, ${id}, '${callTsFull}');"` : "";
                        const currentCallStatus = sInfo ? sInfo.status : undefined;
                        const stCtx = isCheckedIn && currentCallStatus ==='cancelled' ? `oncontextmenu="event.preventDefault();showStatusChangeMenu(event,${id},'${callTsFull}','${currentCallStatus}');"` : "";
                        content += `<div class="timestamp-pair mr-1 mb-1 p-0.5 border border-gray-200 rounded-md"><span class="timestamp-item ${callCls}" ${callCtx}>${callTsFull}</span><span class="status-timestamp ${stCls}" ${stCtx}>${stTs}</span></div>`;
                    });
                    content += `</div></div>`;
                } else if (isCheckedIn) { // isCheckedIn but no calls array or empty calls
                     content += `<p class="text-xs text-gray-500 mt-2">No calls yet.</p>`;
                }


                let buttons = '<div class="absolute top-4 right-4 flex flex-col space-y-2 sm:flex-row sm:space-y-0 sm:space-x-2">';
                if (!isCheckedIn && !signOutTime) { // Not checked in at all today
                    buttons += `<button onclick="checkIn(${id})" class="bg-green-500 text-white px-3 py-1 text-sm rounded-md hover:bg-green-600 shadow-sm">Check In</button>`;
                } else if (isCheckedIn) { // Actively checked in (signOutTime is null)
                    buttons += `<button oncontextmenu="event.preventDefault();showAddCallMenu(event,${id})" class="bg-yellow-500 text-white px-3 py-1 text-sm rounded-md hover:bg-yellow-600 shadow-sm">Add Call</button>`;
                    buttons += `<button onclick="signOut(${id})" class="bg-red-500 text-white px-3 py-1 text-sm rounded-md hover:bg-red-600 shadow-sm">Sign Out</button>`;
                } else { // Signed out for the day (signOutTime is not null, isCheckedIn is false)
                    buttons += `<span class="text-xs text-gray-500 italic">Signed Out</span>`;
                }
                buttons += '</div>';
                card.innerHTML = `<div>${content}</div>${buttons}`;
                driverList.appendChild(card);
            });
        }

        // App Initialization
        console.log('[App Init] Script starting. Will fetch data from backend.');
        showLoading();

        async function fetchAndRenderDrivers() {
            console.log('[App Init] Fetching drivers from backend...');
            try {
                const response = await fetch('http://localhost:3000/api/drivers');
                if (!response.ok) {
                    let errorData;
                    try { errorData = await response.json(); } catch (e) { errorData = { message: response.statusText };}
                    throw new Error(`Failed to fetch drivers: ${response.status} ${errorData.error || errorData.message}`);
                }
                const fetchedDrivers = await response.json();

                // Backend now returns the rich driver objects directly.
                // No complex mapping with placeholders needed here anymore.
                // The structure of each element in fetchedDrivers should be:
                // { id, name, isCheckedIn, checkInTime, signOutTime, calls: [{id, callType, timestamp, fullCallTimestamp, statusInfo}, ...], relevantClearedTimestamp }
                drivers = fetchedDrivers;  // Directly assign the rich data from backend

                console.log(`[App Init] Successfully fetched ${drivers.length} drivers with detailed data.`);
                renderDrivers();
            } catch (e) {
                console.error('[App Init] CRITICAL FAILURE fetching drivers:', e);
                showInitError('App Error: Could not load driver data from backend. Check console. Error: ' + e.message);
                drivers = [];
                renderDrivers();
            } finally {
                showApp();
            }
        }

        // Initial load:
        fetchAndRenderDrivers();
    </script>
</body>
